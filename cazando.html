<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Juego Cazando</title>

    <!-- CSS -->
    <link rel="stylesheet" href="cazando.css">
</head>

<body onload="iniciarJuego()">

    <h1>Juego Cazando</h1>

    <p>Autor: Ariell_jsj</p>

    <!-- MARCADOR -->
    <h2>
        Puntos:
        <span id="puntos">0</span>
    </h2>

    <h2>
        Tiempo:
        <span id="tiempo">10</span>
    </h2>

    <!-- MENSAJE -->
    <p id="mensaje"></p>

    <!-- CANVAS -->
    <canvas id="areaJuego" width="500" height="500"></canvas>

    <br><br>

    <!-- CONTROLES -->
    <div class="controles">

          <br>
        <p><button class="reiniciar" onclick="reiniciarJuego()">REINICIAR</button></p>

        <button onclick="moverArriba()">⬆</button>

         <div class="fila">

        <button onclick="moverIzquierda()">⬅</button>

        <button onclick="moverAbajo()">⬇</button>

        <button onclick="moverDerecha()">➡</button>

    </div>

    <!-- JS -->
    <script src="utils/utils.js"></script>
    <script src="cazando.js"></script>

</body>
</html>
